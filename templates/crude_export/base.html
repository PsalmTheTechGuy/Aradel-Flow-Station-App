<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Crude Export Tracker{% endblock %}</title>
    <!-- Same CSS as main app for consistency but customized -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/apexcharts@3.41.0/dist/apexcharts.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1e293b;
            --accent: #B2000F;
            --bg-body: #f8fafc;
            --sidebar-width: 280px;
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-body); color: #1e293b; margin: 0; }
        
        .sidebar {
            width: var(--sidebar-width);
            background: #1e293b;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            color: white;
            padding: 1.5rem;
            z-index: 1050;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .main-content { 
            margin-left: var(--sidebar-width); 
            padding: 2rem; 
            min-height: 100vh;
            transition: all 0.3s ease;
        }
        
        .nav-link {
            color: rgba(255,255,255,0.7);
            padding: 0.9rem 1.25rem;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            font-weight: 500;
            text-decoration: none;
        }
        .nav-link:hover, .nav-link.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .nav-link i { width: 24px; margin-right: 12px; font-size: 1.2rem; }
        .nav-link.active { border-left: 4px solid var(--accent); background: rgba(255,255,255,0.05); }
        
        .mobile-header {
            display: none;
            background: white;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 1000;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1040;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 2rem;
        }
        
        .kpi-card { text-align: center; padding: 1.5rem; }
        .kpi-label { font-size: 0.85rem; color: #64748b; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; }
        .kpi-value { font-size: 2rem; font-weight: 800; margin-bottom: 0; color: var(--primary); }
        
        .btn-accent { background: var(--accent); color: white; border: none; border-radius: 12px; padding: 0.75rem 1.5rem; font-weight: 600; transition: all 0.3s; }
        .btn-accent:hover { background: #90000c; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(178,0,15,0.3); }

        @media (max-width: 992px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.show { transform: translateX(0); }
            .sidebar-overlay.show { display: block; }
            .main-content { margin-left: 0; padding: 1.5rem; }
            .mobile-header { display: flex; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="mobile-header">
        <div class="d-flex align-items-center">
            <i class="fas fa-ship text-danger fs-4 me-2"></i>
            <span class="fw-bold">ExportTracker</span>
        </div>
        <button class="btn btn-outline-dark" onclick="toggleSidebar()">
            <i class="fas fa-bars"></i>
        </button>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="d-flex align-items-center justify-content-between mb-5 px-2">
            <div class="d-flex align-items-center">
                <div class="bg-white rounded-3 p-2 me-3">
                    <i class="fas fa-ship text-dark fs-4"></i>
                </div>
                <h4 class="mb-0 fw-bold">ExportTracker</h4>
            </div>
            <button class="btn btn-link text-white d-lg-none" onclick="toggleSidebar()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <nav>
            <a href="/crude-export" class="nav-link {% if request.path == '/crude-export' %}active{% endif %}">
                <i class="fas fa-th-large"></i>Dashboard
            </a>
            <a href="/crude-export/entry" class="nav-link {% if request.path == '/crude-export/entry' %}active{% endif %}">
                <i class="fas fa-edit"></i>Data Entry
            </a>
            <a href="/crude-export/print" class="nav-link {% if request.path == '/crude-export/print' %}active{% endif %}">
                <i class="fas fa-print"></i>Print Export Report
            </a>
            <a href="/crude-export/manage" class="nav-link {% if request.path == '/crude-export/manage' %}active{% endif %}">
                <i class="fas fa-database"></i>Manage Data
            </a>

            <div class="small fw-bold text-muted text-uppercase px-3 mt-4 mb-2">Production Monitoring</div>
            <a href="/production/entry" class="nav-link {% if request.path == '/production/entry' %}active{% endif %}">
                <i class="fas fa-chart-line"></i>Production Entry
            </a>
            <a href="/production/print" class="nav-link {% if request.path == '/production/print' %}active{% endif %}">
                <i class="fas fa-file-invoice"></i>Production Report
            </a>
            <a href="/production/manage" class="nav-link {% if request.path == '/production/manage' %}active{% endif %}">
                <i class="fas fa-tasks"></i>Manage Production
            </a>
            <hr class="my-4 opacity-10">
            <a href="/gateway" class="nav-link text-warning">
                <i class="fas fa-exchange-alt"></i>Switch App
            </a>
            <a href="#" onclick="logout()" class="nav-link text-danger mt-auto">
                <i class="fas fa-sign-out-alt"></i>Sign Out
            </a>
        </nav>
    </div>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
        // Auth check
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';

        const userRole = localStorage.getItem('role');
        const allowedFeatures = JSON.parse(localStorage.getItem('allowedFeatures') || '[]');
        if (userRole !== 'admin' && !allowedFeatures.includes('app_crude_export')) {
            window.location.href = '/gateway';
        }

        function getHeaders() {
            return {
                'Authorization': 'Bearer ' + localStorage.getItem('token'),
                'Content-Type': 'application/json'
            };
        }

        async function handleResponse(res) {
            if (res.status === 401) {
                localStorage.clear();
                window.location.href = '/login';
                return;
            }
            return res.json();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('show');
            document.getElementById('sidebarOverlay').classList.toggle('show');
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login';
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>

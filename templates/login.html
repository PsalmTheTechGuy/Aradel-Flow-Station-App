<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Flowstation Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #dc2626;
            --primary-gradient: linear-gradient(135deg, #dc2626 0%, #f97316 100%);
        }
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            max-width: 400px;
            width: 100%;
            margin: 20px;
        }
        .login-header {
            background: var(--primary-gradient);
            padding: 2rem;
            text-align: center;
            border-radius: 24px 24px 0 0;
        }
        .login-header h1 { color: white; margin: 0; font-size: 1.5rem; }
        .login-header p { color: rgba(255,255,255,0.8); margin: 5px 0 0; }
        .login-body { padding: 2rem; }
        .form-label { font-weight: 500; }
        .form-control {
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            padding: 0.75rem 1rem;
        }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(220,38,38,0.15); }
        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            padding: 0.75rem;
            font-weight: 600;
            width: 100%;
        }
        .alert { border-radius: 12px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h1><i class="fas fa-industry me-2"></i>Flowstation Integrated Portal</h1>
            <p>Sign in to access flowstation applications</p>
        </div>
        <div class="login-body">
            <div id="errorAlert" class="alert alert-danger d-none"></div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>
            <div class="text-center mt-3 text-muted">
                <small>Default: admin / admin123</small>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorAlert = document.getElementById('errorAlert');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Signing in...';
            errorAlert.classList.add('d-none');
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                
                if (res.ok) {
                    // Store in localStorage
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.user.username);
                    localStorage.setItem('role', data.user.role);
                    if (data.user.allowed_features) {
                        localStorage.setItem('allowedFeatures', JSON.stringify(data.user.allowed_features));
                    }
                    // Go to gateway
                    window.location.href = '/gateway';
                } else {
                    errorAlert.textContent = data.error || 'Login failed';
                    errorAlert.classList.remove('d-none');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign In';
                }
            } catch(e) {
                errorAlert.textContent = 'Connection error';
                errorAlert.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign In';
            }
        });
    </script>
</body>
</html>

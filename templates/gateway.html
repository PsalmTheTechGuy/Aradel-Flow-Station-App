<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Application - Flowstation Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #B2000F;
            --primary-gradient: linear-gradient(135deg, #B2000F 0%, #d32f2f 100%);
            --secondary-gradient: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        }
        * { font-family: 'Inter', sans-serif; }
        body {
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .gateway-container {
            max-width: 1000px;
            width: 100%;
            padding: 2rem;
            text-align: center;
        }
        .app-card {
            background: white;
            border-radius: 32px;
            padding: 3rem 2rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 2px solid transparent;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .app-card:hover {
            transform: translateY(-15px);
            border-color: var(--primary);
            box-shadow: 0 25px 50px rgba(178, 0, 15, 0.1);
        }
        .icon-circle {
            width: 100px;
            height: 100px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            font-size: 3rem;
            color: white;
        }
        .bg-red { background: var(--primary-gradient); }
        .bg-dark { background: var(--secondary-gradient); }
        
        .app-card h2 { font-weight: 800; font-size: 1.75rem; margin-bottom: 1rem; }
        .app-card p { color: #64748b; font-size: 1.1rem; line-height: 1.6; }
        
        .logout-btn {
            position: fixed;
            top: 2rem;
            right: 2rem;
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        .logout-btn:hover { color: var(--primary); }
        
        .welcome-text { margin-bottom: 4rem; }
        .welcome-text h1 { font-weight: 900; font-size: 3rem; color: #1e293b; margin-bottom: 1rem; }
        .welcome-text p { font-size: 1.25rem; color: #64748b; }
    </style>
</head>
<body>
    <a href="#" onclick="logout()" class="logout-btn">
        <i class="fas fa-sign-out-alt me-2"></i>Sign Out
    </a>

    <div class="gateway-container">
        <div class="welcome-text">
            <h1>Welcome Back, <span id="userName">User</span></h1>
            <p>Please select the application you would like to access today</p>
        </div>

        <div class="row g-4 justify-content-center">
            <div class="col-md-5" id="cardWellTest">
                <a href="/" class="app-card">
                    <div class="icon-circle bg-red">
                        <i class="fas fa-oil-well"></i>
                    </div>
                    <h2>Well Test Pro</h2>
                    <p>Standard well test calculations, analytics, and performance monitoring reports.</p>
                </a>
            </div>
            <div class="col-md-5" id="cardCrudeExport">
                <a href="/crude-export" class="app-card">
                    <div class="icon-circle bg-dark">
                        <i class="fas fa-ship"></i>
                    </div>
                    <h2>Crude Export</h2>
                    <p>Daily crude oil export volumes tracker with interactive A3 plotting sheets.</p>
                </a>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';
        
        document.getElementById('userName').textContent = localStorage.getItem('username') || 'User';

        const role = localStorage.getItem('role');
        const allowedFeatures = JSON.parse(localStorage.getItem('allowedFeatures') || '[]');
        if (role !== 'admin') {
            if (!allowedFeatures.includes('app_welltest')) {
                const c = document.getElementById('cardWellTest');
                if(c) c.style.display = 'none';
            }
            if (!allowedFeatures.includes('app_crude_export')) {
                const c = document.getElementById('cardCrudeExport');
                if(c) c.style.display = 'none';
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login';
        }
    </script>
</body>
</html>
